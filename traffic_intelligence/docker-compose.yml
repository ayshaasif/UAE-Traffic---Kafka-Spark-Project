services:


  postgres:
    image: postgres:15.3
    container_name: uae_traffic_postgres
    hostname: uae_traffic_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_pass
      POSTGRES_DB: traffic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: uae_traffic_kafka
    hostname: uae_traffic_kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_CLUSTER_ID: "AZA2d1qnQpiqgIdV5Mf6cg"
      CLUSTER_ID: "AZA2d1qnQpiqgIdV5Mf6cg"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      
      # Container listens strictly on port 9092 for traffic
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      
      # Advertised: What clients use to reach the broker from the host. When clients connect, tell them to talk to me at localhost:19092 via the INTERNAL lane.
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://localhost:19092"
      
      # Controller quorum voters
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@uae_traffic_kafka:29093"
      
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - kafka_data:/var/lib/kafka/data


volumes:
  kafka_data:
  postgres_data:
  
